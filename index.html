<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPP & OAS Estimator</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (to compile JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom animation for fading in tabs */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON COMPONENTS (Inline SVGs to replace Lucide dependency) ---
        const IconBase = ({ size = 24, className = "", children }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const CalculatorIcon = (props) => (
            <IconBase {...props}>
                <rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>
            </IconBase>
        );
        const CalendarIcon = (props) => (
            <IconBase {...props}>
                <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
            </IconBase>
        );
        const DollarSignIcon = (props) => (
            <IconBase {...props}>
                <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </IconBase>
        );
        const TrendingUpIcon = (props) => (
            <IconBase {...props}>
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
            </IconBase>
        );
        const CheckCircleIcon = (props) => (
            <IconBase {...props}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/>
            </IconBase>
        );
        const RotateCcwIcon = (props) => (
            <IconBase {...props}>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            </IconBase>
        );
        const InfoIcon = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </IconBase>
        );
        const HomeIcon = (props) => (
            <IconBase {...props}>
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </IconBase>
        );


        // --- CONSTANTS & DATA ---
        const YMPE_DATA = {
            2030: 80600, 2029: 78700, 2028: 76800, 2027: 74900, 2026: 73100,
            2025: 71300, 2024: 68500, 2023: 66600, 2022: 64900, 2021: 61600, 2020: 58700,
            2019: 57400, 2018: 55900, 2017: 55300, 2016: 54900, 2015: 53600, 2014: 52500,
            2013: 51100, 2012: 50100, 2011: 48300, 2010: 47200, 2009: 46300, 2008: 44900,
            2007: 43700, 2006: 42100, 2005: 41100, 2004: 40500, 2003: 39900, 2002: 39100,
            2001: 38300, 2000: 37600, 1999: 37400, 1998: 36900, 1997: 35800, 1996: 35400,
            1995: 34900, 1994: 34400, 1993: 33400, 1992: 32200, 1991: 30500, 1990: 28900,
            1989: 27700, 1988: 26500, 1987: 25900, 1986: 25800, 1985: 23400, 1984: 20800,
            1983: 18500, 1982: 16500, 1981: 14700, 1980: 13100, 1979: 11700, 1978: 10400,
            1977: 9300,  1976: 8300,  1975: 7400,  1974: 6600,  1973: 5600,  1972: 5500,
            1971: 5400,  1970: 5300,  1969: 5200,  1968: 5100,  1967: 5000,  1966: 5000
        };

        const getYAMPE = (year) => {
            if (year < 2024) return 0;
            if (year === 2024) return 73200;
            if (year === 2025) return 81200; 
            const ympe = YMPE_DATA[year] || (71300 * Math.pow(1.025, year - 2025));
            return Math.round(ympe * 1.14);
        };

        const CURRENT_YEAR = new Date().getFullYear();
        const MAX_BASE_CPP_2025 = 1364.60;
        const MAX_OAS_2025 = 727.67; // Max OAS for age 65-74 (Jan 2025)

        const getYMPE = (year) => {
            if (YMPE_DATA[year]) return YMPE_DATA[year];
            if (year > 2025) {
                return Math.round(71300 * Math.pow(1.025, year - 2025)); 
            }
            return 5000;
        };

        // --- MAIN COMPONENT ---
        const App = () => {
            const [dob, setDob] = useState('1985-01-01');
            const [retirementAge, setRetirementAge] = useState(65);
            const [yearsInCanada, setYearsInCanada] = useState(40);
            const [earnings, setEarnings] = useState({}); 
            const [activeTab, setActiveTab] = useState('input');

            const birthYear = parseInt(dob.split('-')[0]);
            const startYear = birthYear + 18;
            const endYear = birthYear + retirementAge; 
            
            const years = useMemo(() => {
                const list = [];
                for (let y = startYear; y < endYear; y++) {
                list.push(y);
                }
                return list;
            }, [startYear, endYear]);

            const handleEarningChange = (year, value) => {
                setEarnings(prev => ({ ...prev, [year]: value }));
            };

            const toggleMax = (year, isMax) => {
                // If it IS currently max, clicking it acts as a "Clear" or "Reset" to let user start over
                if (isMax) {
                    const newEarnings = { ...earnings };
                    delete newEarnings[year];
                    setEarnings(newEarnings);
                } else {
                    // Set it to the actual numeric Max value (YAMPE if available, else YMPE)
                    const ympe = getYMPE(year);
                    const yampe = getYAMPE(year);
                    const maxVal = yampe > 0 ? yampe : ympe;
                    setEarnings(prev => ({ ...prev, [year]: maxVal }));
                }
            };

            const fillRemaining = (type) => {
                const newEarnings = { ...earnings };
                years.forEach(y => {
                    if (y >= CURRENT_YEAR) {
                        if (type === 'max') {
                            const ympe = getYMPE(y);
                            const yampe = getYAMPE(y);
                            newEarnings[y] = yampe > 0 ? yampe : ympe;
                        }
                        if (type === 'clear') delete newEarnings[y];
                    }
                });
                setEarnings(newEarnings);
            };
            
            const fillPast = (type) => {
                const newEarnings = { ...earnings };
                years.forEach(y => {
                    if (y < CURRENT_YEAR) {
                        if (type === 'max') {
                            const ympe = getYMPE(y);
                            const yampe = getYAMPE(y);
                            newEarnings[y] = yampe > 0 ? yampe : ympe;
                        }
                    }
                });
                setEarnings(newEarnings);
            };

            const calculateBenefits = () => {
                // --- CPP CALCULATION ---
                const currentYMPE = getYMPE(CURRENT_YEAR);
                
                const yearData = years.map(year => {
                    const ympe = getYMPE(year);
                    const yampe = getYAMPE(year);
                    let rawIncome = earnings[year];
                    
                    if (!rawIncome) rawIncome = 0;
                    rawIncome = parseFloat(rawIncome);

                    const baseIncome = Math.min(rawIncome, ympe);
                    const ratio = baseIncome / ympe;
                    const adjustedEarnings = ratio * currentYMPE;
                    const isEnhancedYear = year >= 2019;
                    const tier1Income = baseIncome; 
                    const tier2Income = Math.max(0, Math.min(rawIncome, yampe) - ympe);

                    return {
                        year,
                        ratio,
                        adjustedEarnings,
                        isEnhancedYear,
                        tier1Income,
                        tier2Income,
                        ympe,
                        yampe
                    };
                });

                // Dropout Logic
                const sortedByRatio = [...yearData].sort((a, b) => a.ratio - b.ratio);
                const totalMonths = years.length * 12;
                const monthsToDrop = Math.floor(totalMonths * 0.17);
                const yearsToDrop = monthsToDrop / 12; 
                const numYearsToDrop = Math.floor(yearsToDrop);
                const retainedYears = sortedByRatio.slice(numYearsToDrop);
                
                const avgRatio = retainedYears.reduce((sum, y) => sum + y.ratio, 0) / retainedYears.length;
                const baseBenefit = MAX_BASE_CPP_2025 * avgRatio;

                // Enhancement Logic
                let enhancedTier1Total = 0;
                let enhancedTier2Total = 0;

                yearData.forEach(d => {
                    if (d.isEnhancedYear) {
                        const t1Credit = (d.tier1Income / d.ympe) * (0.0833 / 40) * currentYMPE;
                        enhancedTier1Total += t1Credit;

                        if (d.year >= 2024) {
                            const spread = d.yampe - d.ympe;
                            if (spread > 0) {
                                const currentSpread = currentYMPE * 0.14; 
                                const t2Credit = (d.tier2Income / spread) * (0.3333 / 40) * currentSpread;
                                enhancedTier2Total += t2Credit;
                            }
                        }
                    }
                });

                const enhancedBenefit = (enhancedTier1Total / 12) + (enhancedTier2Total / 12);

                const monthsDiff = (retirementAge - 65) * 12;
                let cppAdjustmentFactor = 1;
                let cppAdjustmentPercent = 0;

                if (monthsDiff < 0) {
                    cppAdjustmentPercent = monthsDiff * 0.6; 
                } else if (monthsDiff > 0) {
                    const cappedMonths = Math.min(monthsDiff, 60); 
                    cppAdjustmentPercent = cappedMonths * 0.7; 
                }
                
                cppAdjustmentFactor = 1 + (cppAdjustmentPercent / 100);
                const finalCPP = (baseBenefit + enhancedBenefit) * cppAdjustmentFactor;

                // --- OAS CALCULATION ---
                const validYears = Math.min(Math.max(0, yearsInCanada), 40);
                let baseOAS = MAX_OAS_2025 * (validYears / 40);
                
                let oasAmount = 0;
                let oasNote = "";

                if (retirementAge < 65) {
                    oasAmount = 0;
                    oasNote = "Starts at 65";
                } else {
                    const oasMonthsDeferred = Math.min((retirementAge - 65) * 12, 60);
                    const oasBonusPercent = oasMonthsDeferred * 0.6; 
                    oasAmount = baseOAS * (1 + (oasBonusPercent / 100));
                }

                return {
                    cpp: {
                        base: baseBenefit || 0,
                        enhanced: enhancedBenefit || 0,
                        total: finalCPP || 0,
                        adjustmentPercent: cppAdjustmentPercent
                    },
                    oas: {
                        amount: oasAmount,
                        yearsUsed: validYears,
                        note: oasNote
                    },
                    grandTotal: (finalCPP || 0) + oasAmount
                };
            };

            const results = calculateBenefits();

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-12">
                    {/* Header */}
                    <header className="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <CalculatorIcon size={24} />
                            <h1 className="text-xl font-bold">CPP & OAS Estimator</h1>
                        </div>
                        <div className="text-sm opacity-90 hidden sm:block">
                            Estimated in 2025 Dollars
                        </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-6">
                        
                        {/* Top Controls */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2">Date of Birth</label>
                                <input 
                                type="date" 
                                value={dob} 
                                onChange={(e) => setDob(e.target.value)}
                                className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2">
                                Retirement Age: <span className="text-blue-600 font-bold text-lg">{retirementAge}</span>
                                </label>
                                <input 
                                type="range" 
                                min="60" 
                                max="70" 
                                step="1"
                                value={retirementAge} 
                                onChange={(e) => setRetirementAge(parseInt(e.target.value))}
                                className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                />
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                <span>60</span>
                                <span>65</span>
                                <span>70</span>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2">
                                Years in Canada (since 18): <span className="text-blue-600 font-bold text-lg">{yearsInCanada}</span>
                                </label>
                                <div className="flex items-center gap-2">
                                    <input 
                                    type="number"
                                    min="0"
                                    max="80"
                                    value={yearsInCanada} 
                                    onChange={(e) => setYearsInCanada(parseInt(e.target.value) || 0)}
                                    className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                    />
                                </div>
                                <div className="text-xs text-gray-400 mt-1">
                                Max 40 years count for OAS.
                                </div>
                            </div>
                        </div>

                        {/* Tab Navigation */}
                        <div className="flex gap-4 mb-6 border-b border-gray-200">
                        <button 
                            onClick={() => setActiveTab('input')}
                            className={`pb-2 px-1 font-medium transition-colors ${activeTab === 'input' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            Contribution History
                        </button>
                        <button 
                            onClick={() => setActiveTab('results')}
                            className={`pb-2 px-1 font-medium transition-colors ${activeTab === 'results' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            Estimate Results
                        </button>
                        </div>

                        {/* --- INPUT TAB --- */}
                        {activeTab === 'input' && (
                        <div className="animate-fade-in">
                            <div className="flex flex-wrap gap-2 mb-4">
                                <button onClick={() => fillPast('max')} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full border border-gray-300 transition">
                                Set Past to MAX
                                </button>
                                <button onClick={() => fillRemaining('max')} className="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1 rounded-full border border-blue-200 transition">
                                Set Future to MAX
                                </button>
                                <button onClick={() => setEarnings({})} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 rounded-full border border-red-200 transition ml-auto flex items-center gap-1">
                                <RotateCcwIcon size={12} /> Reset
                                </button>
                            </div>

                            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                <div className="grid grid-cols-12 bg-gray-50 p-3 text-xs font-bold text-gray-500 uppercase tracking-wider border-b">
                                <div className="col-span-2">Year</div>
                                <div className="col-span-2">Age</div>
                                <div className="col-span-3 text-right pr-4">YMPE</div>
                                <div className="col-span-5">Earnings</div>
                                </div>
                                <div className="max-h-[500px] overflow-y-auto">
                                {years.map(year => {
                                    const isFuture = year > CURRENT_YEAR;
                                    const ympe = getYMPE(year);
                                    const yampe = getYAMPE(year);
                                    const maxVal = yampe > 0 ? yampe : ympe;

                                    const val = earnings[year] || '';
                                    const isMax = val == maxVal && val !== '';

                                    return (
                                    <div key={year} className={`grid grid-cols-12 p-3 border-b last:border-0 items-center hover:bg-gray-50 transition ${isFuture ? 'bg-blue-50/30' : ''}`}>
                                        <div className="col-span-2 text-sm font-medium text-gray-700">{year}</div>
                                        <div className="col-span-2 text-sm text-gray-500">{year - birthYear}</div>
                                        <div className="col-span-3 text-right pr-4 text-sm text-gray-400 font-mono">${ympe.toLocaleString()}</div>
                                        <div className="col-span-5 flex items-center gap-2">
                                        <div className="relative flex-1">
                                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">$</span>
                                            <input 
                                            type="number" 
                                            value={val}
                                            onChange={(e) => handleEarningChange(year, e.target.value)}
                                            className={`w-full pl-5 pr-2 py-1.5 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none ${isMax ? 'bg-green-50 text-green-700 font-semibold' : 'bg-white'}`}
                                            placeholder="0"
                                            />
                                        </div>
                                        <button 
                                            onClick={() => toggleMax(year, isMax)}
                                            className={`px-2 py-1 text-xs font-bold rounded border transition-colors ${isMax ? 'bg-green-100 text-green-700 border-green-200' : 'bg-gray-100 text-gray-400 border-gray-200'}`}
                                        >
                                            MAX
                                        </button>
                                        </div>
                                    </div>
                                    );
                                })}
                                </div>
                            </div>
                        </div>
                        )}

                        {/* --- RESULTS TAB --- */}
                        {activeTab === 'results' && (
                        <div className="space-y-6 animate-fade-in">
                            
                            {/* Main Result Card */}
                            <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl shadow-xl p-8 text-white relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10">
                                    <DollarSignIcon size={150} />
                                </div>
                                
                                <div className="relative z-10">
                                    <h2 className="text-blue-100 text-sm font-semibold uppercase tracking-widest mb-1">Total Estimated Monthly Payout</h2>
                                    <div className="flex items-baseline gap-2">
                                    <span className="text-5xl font-bold">${results.grandTotal.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                                    <span className="text-blue-200">/ mo</span>
                                    </div>
                                    <div className="mt-4 flex gap-4 text-sm">
                                        <div className="flex items-center gap-1 bg-white/10 px-3 py-1 rounded-full">
                                            <span className="opacity-75">CPP:</span>
                                            <span className="font-bold">${results.cpp.total.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})}</span>
                                        </div>
                                        <div className="flex items-center gap-1 bg-white/10 px-3 py-1 rounded-full">
                                            <span className="opacity-75">OAS:</span>
                                            <span className="font-bold">${results.oas.amount.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Breakdown Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {/* Base CPP */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                    <div className="flex items-center gap-2 mb-4 text-gray-700">
                                        <TrendingUpIcon size={20} className="text-blue-600"/>
                                        <h3 className="font-bold">Base CPP</h3>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                        <span className="text-gray-500">Base Entitlement</span>
                                        <span className="font-medium">${results.cpp.base.toFixed(2)}</span>
                                        </div>
                                        <div className="h-px bg-gray-100 my-2"></div>
                                        <p className="text-xs text-gray-400">
                                        Based on your average career earnings (with 17% dropout).
                                        </p>
                                    </div>
                                </div>

                                {/* Enhanced CPP */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                    <div className="flex items-center gap-2 mb-4 text-gray-700">
                                        <CheckCircleIcon size={20} className="text-green-600"/>
                                        <h3 className="font-bold">Enhanced CPP</h3>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                        <span className="text-gray-500">Enhancement</span>
                                        <span className="font-medium text-green-600">+${results.cpp.enhanced.toFixed(2)}</span>
                                        </div>
                                        <div className="h-px bg-gray-100 my-2"></div>
                                        <p className="text-xs text-gray-400">
                                        Extra benefit from contributions made 2019 onwards.
                                        </p>
                                    </div>
                                </div>

                                {/* OAS Card */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                    <div className="flex items-center gap-2 mb-4 text-gray-700">
                                        <HomeIcon size={20} className="text-orange-500"/>
                                        <h3 className="font-bold">Old Age Security</h3>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-500">Amount</span>
                                            <span className="font-medium text-orange-600">${results.oas.amount.toFixed(2)}</span>
                                        </div>
                                        {results.oas.note && (
                                            <div className="text-xs text-red-500 font-medium">
                                                {results.oas.note}
                                            </div>
                                        )}
                                        <div className="flex justify-between text-sm text-gray-500 italic">
                                            <span>Years Counted</span>
                                            <span>{results.oas.yearsUsed} / 40</span>
                                        </div>
                                        <div className="h-px bg-gray-100 my-2"></div>
                                        <p className="text-xs text-gray-400">
                                            Based on residency. {retirementAge > 65 ? "Includes deferral bonus." : ""}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Adjustment Info */}
                            <div className="bg-amber-50 border border-amber-100 p-5 rounded-xl flex gap-4">
                                <InfoIcon className="text-amber-500 shrink-0 mt-1" size={24} />
                                <div>
                                    <h4 className="font-bold text-amber-800 mb-1">Age Adjustments Applied</h4>
                                    <ul className="text-sm text-amber-700 space-y-1 list-disc list-inside">
                                        <li>
                                            CPP: 
                                            <span className="font-semibold"> {results.cpp.adjustmentPercent > 0 ? '+' : ''}{results.cpp.adjustmentPercent.toFixed(1)}% </span>
                                            for retiring at {retirementAge}.
                                        </li>
                                        {retirementAge > 65 && (
                                            <li>
                                                OAS: 
                                                <span className="font-semibold"> +{Math.min((retirementAge - 65) * 12 * 0.6, 36).toFixed(1)}% </span>
                                                deferral bonus.
                                            </li>
                                        )}
                                        {retirementAge < 65 && (
                                            <li>
                                                OAS: Not eligible until 65 (shown as $0).
                                            </li>
                                        )}
                                    </ul>
                                </div>
                            </div>

                        </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
